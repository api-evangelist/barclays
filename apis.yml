description: >-
  Barclays is a multinational financial services company that operates in retail and
  commercial banking, investment banking, wealth management, and credit cards. With
  a presence in over 40 countries and serving more than 48 million customers worldwide,
  Barclays offers a wide range of financial products and services to help individuals,
  businesses, and institutions meet their financial goals.
